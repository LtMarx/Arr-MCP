x-arr-env: &arr-env
  RADARR_URL: ${RADARR_URL:-}
  RADARR_API_KEY: ${RADARR_API_KEY:-}
  SONARR_URL: ${SONARR_URL:-}
  SONARR_API_KEY: ${SONARR_API_KEY:-}
  LIDARR_URL: ${LIDARR_URL:-}
  LIDARR_API_KEY: ${LIDARR_API_KEY:-}
  READARR_URL: ${READARR_URL:-}
  READARR_API_KEY: ${READARR_API_KEY:-}
  PROWLARR_URL: ${PROWLARR_URL:-}
  PROWLARR_API_KEY: ${PROWLARR_API_KEY:-}

services:
  # stdio mode — launched by the MCP client directly (Claude Desktop)
  arr-mcp-stdio:
    build: .
    image: ghcr.io/ltmarx/arr-mcp:latest
    profiles: [stdio]
    stdin_open: true
    tty: false
    environment:
      <<: *arr-env
      MCP_TRANSPORT: stdio

  # http mode — persistent server for remote MCP clients (ChatGPT, etc.)
  arr-mcp-http:
    build: .
    image: ghcr.io/ltmarx/arr-mcp:latest
    profiles: [http]
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-3000}:${MCP_PORT:-3000}"
    environment:
      <<: *arr-env
      MCP_TRANSPORT: http
      MCP_PORT: ${MCP_PORT:-3000}
      MCP_HOST: "0.0.0.0"
